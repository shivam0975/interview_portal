<div class="auth-page d-flex align-items-center justify-content-center px-3 py-5">
  <div class="auth-card card border-0 shadow-lg">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <p class="text-uppercase small fw-semibold text-primary mb-2">Create account</p>
        <h1 class="h3 mb-2">Register</h1>
        <p class="text-muted mb-0">Create your account in a few seconds.</p>
      </div>

      <form (ngSubmit)="onRegister()" #registerForm="ngForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-control form-control-lg"
            [(ngModel)]="email"
            required
            email
            placeholder="you@example.com"
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control form-control-lg"
            [(ngModel)]="password"
            required
            minlength="6"
            placeholder="Create a password"
          />
        </div>

        <button class="btn btn-primary btn-lg w-100" type="submit" [disabled]="registerForm.invalid || isLoading">
          {{ isLoading ? 'Creating account...' : 'Register' }}
        </button>
      </form>

      <p class="text-center mt-3 mb-0 text-muted" *ngIf="message">{{ message }}</p>
      <p class="text-center mt-4 mb-0">
        Already have an account?
        <a routerLink="/login">Login</a>
      </p>
    </div>
  </div>
</div>
